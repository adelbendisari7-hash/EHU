version: '3.8'

services:
  ocr-service:
    build: .
    ports:
      - '8001:8001'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - USE_GPU=false
      - ALLOWED_ORIGINS=http://localhost:3000,https://ehu-surveillance.vercel.app
    volumes:
      - ocr-models-paddle:/root/.paddleocr
      - ocr-models-easy:/root/.EasyOCR
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  ocr-models-paddle:
  ocr-models-easy:
